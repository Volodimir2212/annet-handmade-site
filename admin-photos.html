<style>
#category-filter{

color:var(--accent);
font-weight:500;

}
.admin-container{
max-width:1100px;
margin:auto;
padding:20px;
text-align:center;
}

.admin-title{
color:var(--primary);
margin-bottom:20px;
}

.photos-controls{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.photos-controls select,
.photos-controls button{

padding:10px 14px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;

}

.photos-controls button{

background:var(--primary);
color:white;
border:none;
cursor:pointer;

}

.photos-grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;

}

.photo-card{

background:#fff;
padding:10px;
border-radius:10px;
border:1px solid #eee;

display:flex;
flex-direction:column;
gap:10px;

}

.photo-card img{

width:100%;
border-radius:6px;
cursor:pointer;

}

.photo-card button{

background:#e74c3c;
color:white;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;

}

.empty-state{
color:var(--accent);
margin-top:30px;
font-size:16px;
}

</style>
