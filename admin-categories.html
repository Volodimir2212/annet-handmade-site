<style>
.body{
    color: var(--accent);
    font-family:system-ui, sans-serif;
}
.gallery-modal{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.6);

display:flex;
align-items:center;
justify-content:center;

z-index:999;

}

.gallery-modal-window{

background:#fff;

width:90%;
max-width:900px;
max-height:80vh;

display:flex;
flex-direction:column;

border-radius:10px;
overflow:hidden;

}

.gallery-modal-header{

display:flex;
justify-content:space-between;
align-items:center;

padding:15px;
border-bottom:1px solid #eee;

}

.gallery-modal-header button{

border:none;
background:none;
font-size:20px;
cursor:pointer;

}

.gallery-modal-content{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(120px,1fr));

gap:10px;

padding:15px;

overflow-y:auto;

}

.gallery-modal-content img{

width:100%;
cursor:pointer;
border-radius:6px;
transition:0.2s;

}

.gallery-modal-content img:hover{

transform:scale(1.05);

}
.admin-container{
max-width:900px;
margin:60px auto;
 color: var(--accent);

}


.admin-add{
display:flex;
gap:10px;
margin-bottom:30px;

}

.admin-add input{
padding:10px;
flex:1;
}

.category-item{

display:flex;
align-items:center;
gap:15px;

padding:15px;
margin-bottom:12px;

border-radius:10px;

background:#fff;
border:1px solid #eee;
 box-shadow:0 15px 35px rgba(149,103,106,.35);
}

 



.category-cover{

width:70px;
height:70px;

object-fit:cover;

border-radius:8px;

}

.category-info{

flex:1;
font-size:15px;

}

.category-info b{
font-size:16px;
}

.category-actions{

display:flex;
flex-wrap:wrap;
gap:10px;

}



.category-actions button{

padding:10px 14px;

border:none;
border-radius:6px;

cursor:pointer;

font-size:14px;
font-weight:500;

min-height:40px;

}
.category-actions button:hover{

opacity:0.9;
transform:scale(1.03);
box-shadow:0 15px 35px rgba(149,103,106,.35);
}
button[data-gallery]{

background:#d8c7c9;
color:#4a3d3f;

}
button[data-upload]{

background:#6b5b5d;
color:white;

}
button[data-delete]{

background:#e74c3c;
color:white;

}

.drag-handle{
cursor:grab;
font-size:22px;
padding:0 10px;
user-select:none;
}
@media(max-width:600px){

.category-item{

flex-direction:column;
align-items:flex-start;

}

.category-actions{

width:100%;

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

button[data-delete]{

grid-column:1/3;

}

}
</style>
